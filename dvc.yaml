stages:
  download_data:
    cmd: python src/download_data.py
    deps:
      - src/download_data.py
    outs:
      - data/penguins.csv

  prepare_data:
    cmd: python src/prepare_data.py
    deps:
      - src/prepare_data.py
      - data/penguins.csv
    params:
      - data.test_size
      - data.random_state
      - data.target_column
    outs:
      - data/train.csv
      - data/test.csv
      - models/encoder.pkl

  train_model:
    cmd: python src/train_model.py
    deps:
      - src/train_model.py
      - data/train.csv
      - models/encoder.pkl
    params:
      - optuna
      - model
      - mlflow
    outs:
      - models/model.pkl

  evaluate:
    cmd: python src/evaluate.py
    deps:
      - src/evaluate.py
      - data/test.csv
      - models/model.pkl
      - models/encoder.pkl
    metrics:
      - metrics.json:
          cache: false

  register_bentoml:
    cmd: python src/register_bentoml.py
    deps:
      - src/register_bentoml.py
      - models/model.pkl
      - models/encoder.pkl
      - metrics.json
  eda:
    cmd: python src/eda.py
    deps:
      - src/eda.py
      - data/penguins.csv
    outs:
      - reports/eda_figures/

  explain:
    cmd: python src/explain.py
    deps:
      - src/explain.py
      - data/test.csv
      - models/model.pkl
    outs:
      - reports/explain_figures/

  learning_curve:
    cmd: python src/learning_curve.py
    deps:
      - src/learning_curve.py
      - data/train.csv
      - models/model.pkl
    outs:
      - reports/learning_curve_figures/

  map_viz:
    cmd: python src/map_viz.py
    deps:
      - src/map_viz.py
      - data/penguins.csv
    outs:
      - reports/map_figures/

  generate_report:
    cmd: python src/generate_report.py
    deps:
      - src/generate_report.py
      - data/penguins.csv
    outs:
      - reports/eda_report.md

